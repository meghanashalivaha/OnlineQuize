<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#43cea2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
width:400px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

button{
background:#667eea;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>
<body>

<div class="card">

<h3>Question {{qno}} of {{total}}</h3>

<p>{{question}}</p>

<form method="POST">

{% for option in options %}

<input type="radio" name="option" value="{{option}}" required> {{option}}<br><br>

{% endfor %}

<button type="submit">Next</button>

</form>

</div>

</body>
</html>
