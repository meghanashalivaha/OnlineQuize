<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9966,#ff5e62);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:white;
padding:30px;
width:400px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}
button{
background:#ff5e62;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>
<body>
<div class="card">
<h2>Quiz Completed!</h2>
<h3>Score: {{score}} / {{total}}</h3>
<h3>Percentage: {{percentage}}%</h3>
<h2>{{message}}</h2>
<a href="/restart">
<button>Try Again</button>
</a>
<br><br>
<a href="/logout">Logout</a>
</div>
</body>
</html>
